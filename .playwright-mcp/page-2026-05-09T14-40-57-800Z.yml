                          - generic [ref=e1349]: Why Can the Student Outperform the Teacher?
                          - generic [ref=e1352]:
                            - generic [ref=e1353]: This is another surprising part of the experiment but it is not new. In fact, in the original work by
                            - link "Agarwal et al., 2023" [ref=e1356] [cursor=pointer]:
                              - /url: https://arxiv.org/pdf/2306.13649
                              - generic [ref=e1357]: Agarwal et al., 2023
                            - generic [ref=e1358]: ", they show that distilled students surpass the teacher's performance on GSM8K. I do not have a concrete explanation but I think there are a few plausible hypotheses."
                          - generic [ref=e1362]: Unlike in traditional distillation, OPD's supervision could be more targeted as it uses student-generated states. This matters because the student’s mistakes are not necessarily the teacher’s mistakes. If we train only on teacher-generated trajectories, the student may receive supervision on parts of the distribution it rarely visits. But in OPD, the teacher gives advice on the student’s own prefixes.
                          - generic [ref=e1366]: Second, KL matching is not the same as reward maximization. At the start of this post, I described OPD as somewhat analogous to RL with token-level teacher supervision but this analogy is imperfect. The training signal from minimizing KL has significantly higher bias than standard RLVR rewards. The teacher distribution may contain information about style, uncertainty, alternative continuations, and reasoning structure. Matching it can reshape the student distribution in ways that improve sampling behavior without exactly reproducing the teacher’s greedy behavior.
                          - generic [ref=e1370]: So the student can improve even if the teacher’s own sampled outputs are not better. This is hard to reason about if we only think in terms of individual tokens. It makes more sense if we think in terms of distributional shaping.
                          - generic [ref=e1373]:
                            - generic [ref=e1374]: A Note on Distributional Shaping
                            - generic [ref=e1375]: This perspective of thinking about training as changing the shape of the model distribution can be unintuitive. One example is this work by
                            - link "Zhang et al., 2026" [ref=e1378] [cursor=pointer]:
                              - /url: https://arxiv.org/abs/2604.01193
                              - generic [ref=e1379]: Zhang et al., 2026
                            - generic [ref=e1380]: . The authors report coding improvements when trained on a dataset consisting of 1 model-generated completion per prompt with no correctness filtering. Even more surprising is that when they self-distill using high temperature - resulting in gibberish training data, training on this poor quality data still improves performance. The authors attempt to explain the results by comparing probability outputs at certain tokens but the point is that it is extremely challenging for one to build intuition around these high dimensional things.
                          - generic [ref=e1383]:
