                        - generic [ref=e395]:
                          - generic [ref=e670]: I have been thinking about post-training methods in terms of distributions. A language model is a distribution over sequences. When we post-train it and attempt to teach it a task, we are reshaping this distribution. Different post-training methods differ in how they reshape this distribution, what they treat as the target and how directly they define this target.
                          - generic [ref=e674]: This is neither a very precise statement nor is it meant to be fully rigorous. I just find it to be a useful mental model, but I think it explains a lot of the qualitative differences between SFT, RL, and On-Policy Distillation. This is the intuition I want to explore in this post.
                          - heading "A Distributional View of Post-Training" [level=2] [ref=e676]:
                            - generic [ref=e678]: A Distributional View of Post-Training
                          - generic [ref=e682]: "Under this view, the most important question to ask is: What is the target distribution that we are optimizing towards?"
                          - generic [ref=e686]: "SFT: A Fixed External Target Distribution."
                          - generic [ref=e690]: SFT is the simplest case.
                          - generic [ref=e694]: You have an annotated dataset. Maybe it was written by humans. Maybe it was generated by a stronger model. Either way, the dataset exists before training. Then you do cross-entropy training on your starting model. In distribution terms, the current model is one distribution, and the dataset defines another distribution. SFT pulls the model toward the dataset distribution.
                          - generic [ref=e698]: Because of the nature of negative log likelihood, the distribution that you start with does not actually matter. This is why I think SFT has a very natural Catastrophic Forgetting failure mode. If the dataset distribution is far from the model’s original distribution, the model has no built-in reason to prefer a nearby solution and is simply pulled toward the demonstrated tokens.
                          - generic [ref=e702]: This does not mean SFT is bad. SFT is incredibly useful. But in terms of geometry, it is a very direct pull toward an external target with little regard for the starting policy. This makes it good for "cold-start" type tasks where the expected output format needs to be changed drastically.
                          - generic [ref=e706]: "RL: Direction of Greatest Expected Reward"
                          - generic [ref=e710]: Online Reinforcement Learning (RL) looks different. The model generates samples from itself; these samples are scored by some reward function; then the model is updated to increase the expected reward it receives via Policy Gradient.
                          - generic [ref=e714]: Here, the concept of a "target distribution" is a lot harder to define. I will revisit this in later sections but at a high level, there isn't an arbitrary external distribution that the model is being pulled towards.
                          - generic [ref=e718]: Of course, this only works if the reward is meaningful. In RLVR, where the reward is verifiable, the reward direction is often a pretty good proxy for quality and so moving along the reward direction should get us a better model. In RLHF, where the reward model is imperfect, the situation is messier. We will come back to this later.
                          - generic [ref=e722]: "On-Policy Distillation: Pseudo RL"
                          - generic [ref=e726]: On-policy distillation (OPD) is somewhere between SFT and RL. Like SFT, it has a teacher signal. The student is trained to match another distribution but like RL, the data comes from the student. At each step, the algorithm is performing on-policy sampling but the gradient is pulling the model towards matching the teacher's distribution via reverse KL divergence. Loosely, OPD can be thought of as similar in nature to RL where instead of weighting completions by advantage, it weights using the log ratio between the student and the teacher.
                          - generic [ref=e729]:
                            - generic [ref=e730]: A new variant of OPD is
                            - link "On-Policy Self Distillation (OPSD)" [ref=e733] [cursor=pointer]:
                              - /url: https://arxiv.org/abs/2601.18734
                              - generic [ref=e734]: On-Policy Self Distillation (OPSD)
                            - generic [ref=e735]: . The teacher and student are the same model but when computing the 'teacher' log probabilities, the teacher is provided with the reference solution as a prefix. The idea being this privileged information that the teacher has access to will provide the learning signal.
                          - generic [ref=e739]: The problem with this is that since the student and teacher model are the same model, they end up having very similar outputs for most tokens. The authors did a per-token KL analysis and found that style or pivot tokens, things like “wait” or “alright”, could have higher KL than math tokens like “power”, “exponent”, or “logarithm”. Therefore, if we update too aggressively on these unimportant tokens, the model might collapse. The solution is thus to introduce a per-token clipping mechanism to prevent over updates.
                          - generic [ref=e743]: This is why OPSD feels closer to RLHF than RLVR. In RLHF, the signal from the reward model has higher bias, so we use KL penalties and trust-region style clipping to avoid over-optimizing the wrong thing. In OPSD, the teacher signal is also not perfectly correlated with task importance since some high KL tokens could simply be style. With verifiable rewards, the reward function is lower bias. This is why (among other reasons) people are often more comfortable removing explicit KL penalties or loosening trust-region constraints (using GRPO instead of PPO) in RLVR.
                          - generic [ref=e746]:
                            - generic [ref=e747]: A common argument is that RLVR with outcome rewards struggles with per-token credit-assignment and the advantage function provides only O(1) bits of information per episode (
                            - link "Schulman et al., 2025" [ref=e750] [cursor=pointer]:
                              - /url: https://thinkingmachines.ai/blog/lora/
                              - generic [ref=e751]: Schulman et al., 2025
                            - generic [ref=e752]: ). OPSD seems to be on the opposite extreme where each token gets its unique 'reward' but the algorithm introduces more noise and bias per update.
                          - heading "On-Policy Distillation With Different Teachers" [level=2] [ref=e754]:
                            - generic [ref=e756]: On-Policy Distillation With Different Teachers
                          - generic [ref=e759]:
                            - generic [ref=e760]: The setup for this experiment uses my Minimal Code Editing task. I highly encourage reading my
                            - link "previous post" [ref=e763] [cursor=pointer]:
                              - /url: https://nrehiew.github.io/blog/minimal_editing/
                              - generic [ref=e764]: previous post
                            - generic [ref=e765]: "to get some context before continuing here. As a quick summary, the model is provided with a buggy corrupted function and asked to fix the bug and nothing else. We check if the model's solution works and if any other part of the function has been rewritten against the original uncorrupted function. I like this environment because it helps test for 2 things: 1)"
                            - generic [ref=e766]: Generalization
                            - generic [ref=e767]: ": I can train the model on one set of corruption types, then evaluate it on a different set of corruptions. This lets me ask whether the model learned the general behavior of minimum editing, or whether it only learned to reverse specific corruptions. 2)"
                            - generic [ref=e768]: Catastrophic Forgetting
                            - generic [ref=e769]: ": Unlike standard code generation tasks, minimum editing is a niche coding behavior. I can thus evaluate the fine-tuned model on LiveCodeBench to check for any degradation in code generation ability."
                          - generic [ref=e773]: For this experiment, I first trained two teacher models with SFT and RL respectively. The performance of both teachers replicated the results in the previous post. Both learned the minimum editing behavior but RL generalized better and did not show meaningful forgetting while SFT showed degradation on general code generation. Before performing OPD, I expected the student distilled from the RL teacher to perform better.
                          - generic [ref=e776]:
