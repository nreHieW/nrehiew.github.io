                          - generic [ref=e1031]:
                            - generic [ref=e1032]: What I hope to have convinced you of in this post is that any such algorithm will have to lean on on-policy data. It isn't that RL is a uniquely special algorithm, and it isn't that explicit KL penalties are doing the heavy lifting. The thing that lets you push capability up without blowing through your KL budget is on-policy training. The insight isn't new (
