                            - generic [ref=e1037]: ), but I haven't found a single place that pulls the research together, and most of the literature still treats RL as flatly 'superior'.
                          - generic [ref=e1040]:
                            - generic [ref=e1041]: The growing popularity of On-Policy Distillation has actually made this easier to see. Putting it next to RL and SFT, the fact that OPD and RL end up in similar places is what convinces me that on-policy data is the load-bearing ingredient. The other knob, and the one I think this hypothetical algorithm has to get right, is the old credit assignment problem. Outcome rewards are too sparse, which is why RL is so expensive. Process Reward Models in the style of
                            - link "Lightman et al., 2023" [ref=e1044] [cursor=pointer]:
