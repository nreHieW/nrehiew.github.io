                          - generic [ref=e966]: Much of what explains this follows from the analysis in the sections above. Firstly, in SFT, the model is penalized for not assigning probability to a specific answer. On the other hand, RL is less imitation-like by construction since the supervision is attached to task success rather than a specific sequence of tokens.
                          - generic [ref=e969]:
                            - generic [ref=e970]: Crucially, we can borrow the work of
                            - link "Ross et al., 2010" [ref=e973] [cursor=pointer]:
                              - /url: https://arxiv.org/abs/1011.0686
                              - generic [ref=e974]: Ross et al., 2010
                            - generic [ref=e975]: . In SFT, the model only sees states the teacher visits. At test time because of autoregression, one mistake by the student might move it to states the teacher would have never visited. This mismatch can result in compounding errors when the student's prefix (or current state) differs from what the teacher would have done. As such, on-policy data aggregation can reduce this mismatch.
