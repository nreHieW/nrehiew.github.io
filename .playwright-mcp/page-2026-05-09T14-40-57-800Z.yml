                          - generic [ref=e788]: This is not what happened.
                          - generic [ref=e792]: The OPD student trained from the SFT teacher and the OPD student trained from the RL teacher ended up looking extremely similar. Even more surprisingly, both OPD students slightly outperformed the RL teacher and significantly outperformed the SFT teacher. This was true even though the RL teacher had a higher final reward during its own training run.
                          - generic [ref=e796]: Further, even though the SFT teacher showed degradation on general code generation and the RL teacher did not, the OPD students trained from both teachers showed only slight forgetting. The OPD student forgot less than the SFT teacher, even when the teacher itself was the degraded SFT model. This was really surprising since if the teacher distribution were the main thing that mattered, then the student trained from the SFT teacher should inherit more of the SFT teacher’s forgetting. But it did not.
                          - generic [ref=e800]: It is worth noting that the OPD results are still slightly worse than pure RL and so it remains to be seen whether combining OPD as well as an actual reward from the environment within the loss would work better.
                          - generic [ref=e804]: Nonetheless, this suggests that the source of the data (ie. via on-policy sampling) matters a lot while the teacher matters perhaps less than I expected. This is a hopeful result because it means that we can "overtrain" a specialized model - maybe even via brute-force SFT - and then do OPD to learn this capability while preserving a lot of the other capabilities we care about.
                          - heading "Why Does RL Forget Less?" [level=2] [ref=e806]:
                            - generic [ref=e808]: Why Does RL Forget Less?
                          - generic [ref=e812]: There are a few common explanations and while I think all of them contain some truth, I do not find most fully satisfying.
                          - generic [ref=e816]: SFT is Forward KL, RL is Reverse KL
                          - generic [ref=e820]: The first explanation is often related to the directions of KL divergence both algorithms are optimizing for. SFT via Cross Entropy on a fixed dataset is equivalent to minimizing forward KL divergence, up to constants.
                          - generic [ref=e824]: "$$ \\begin{align} D_{KL}(p \\| q_\\theta) &= \\sum_x p(x) \\log \\frac{p(x)}{q_\\theta(x)} \\\\ &= \\sum_x p(x) \\log p(x) - \\sum_x p(x) \\log q_\\theta(x) \\\\ &= -H(p) + H(p, q_\\theta) \\end{align} $$"
                          - generic [ref=e827]:
                            - generic [ref=e828]: The mode-covering behavior of forward KL could thus lead to sacrificing previous modes (representing pre-existing capabilities) to learn the new task.
                            - link "Chen et al., 2025" [ref=e831] [cursor=pointer]:
                              - /url: https://arxiv.org/abs/2510.18874
                              - generic [ref=e832]: Chen et al., 2025
                            - generic [ref=e833]: showed that RL can be thought of as reverse KL minimization.
