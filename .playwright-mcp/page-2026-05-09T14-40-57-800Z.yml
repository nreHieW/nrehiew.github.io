                          - generic [ref=e1537]: I find such arguments to be useful but incomplete. The problem is that the argument leans heavily on explicit KL regularization against a reference model. But empirically, RL can still be resistant to forgetting even when this KL penalty is removed or heavily reduced. In RLVR, people often train with much weaker KL constraints than in RLHF-style setups, and yet the anti-forgetting behavior often remains.
                          - generic [ref=e1541]: SFT Has Uniform, Aggressive Token-Level Gradients
                          - generic [ref=e1545]: "#### Data dependent regularization"
                          - generic [ref=e1548]:
                            - generic [ref=e1549]: First, SFT gives dense, uniform supervision on every token. In SFT, every demonstrated token is treated as something the model should increase probability on. The token could be task-critical, like a mathematical operator, or it could be a style token, like “therefore” or “we can see that”. The loss does not know the difference and it just pushes up the probability of the demonstrated token, creating broad updates.
                            - link "Diao et al., 2026" [ref=e1552] [cursor=pointer]:
                              - /url: https://arxiv.org/abs/2601.02151
                              - generic [ref=e1553]: Diao et al., 2026
                            - generic [ref=e1554]: found that SFT contains many tokens with low probability and low entropy. This means that the model is highly confident in its prediction but is forced to fit a divergent ground-truth label which would impact existing representations.
                          - generic [ref=e1557]:
                            - generic [ref=e1558]: In contrast, RL has some form of data-dependent regularization (
                            - link "Lai et al., 2025" [ref=e1561] [cursor=pointer]:
                              - /url: https://arxiv.org/abs/2507.05386
                              - generic [ref=e1562]: Lai et al., 2025
                            - generic [ref=e1563]: ). For example during advantage estimation when rewards are normalized within a group, a group with higher diversity and reward variance receives smaller updates compared to a group with low variance.
                          - generic [ref=e1567]: "#### RL has sparser parameter updates"
                          - generic [ref=e1570]:
                            - generic [ref=e1571]: As a result,
                            - link "Mukherjee et al., 2025" [ref=e1574] [cursor=pointer]:
                              - /url: https://arxiv.org/abs/2505.11711
                              - generic [ref=e1575]: Mukherjee et al., 2025
                            - generic [ref=e1576]: found that RL updates only a small subnetwork of a model via sparse but full-rank updates while SFT induces dense ones. Similarly,
                            - link "Yuan et al., 2025" [ref=e1579] [cursor=pointer]:
                              - /url: https://arxiv.org/abs/2510.04454
                              - generic [ref=e1580]: Yuan et al., 2025
                            - generic [ref=e1581]: found that SFT has more redundancy in parameter updating. When they prune the number of parameters updated of both SFT and RL, they found that the performance of SFT degrades much faster.
                          - generic [ref=e1585]: While both parts of the argument are empirically sound when it comes to the SFT vs RL comparison, I slightly question if they are general enough to be applied to algorithm-analysis or are the results just specific to the domains the authors tested. Further, how does OPD fit into this picture?
                          - generic [ref=e1589]: "The Explanation I Prefer: On-Policy Data"
                          - generic [ref=e1592]:
                            - generic [ref=e1593]: The explanation I most align with is the one from
                            - link "Shenfeld et al., 2025" [ref=e1596] [cursor=pointer]:
                              - /url: https://arxiv.org/abs/2509.04259
                              - generic [ref=e1597]: Shenfeld et al., 2025
                            - generic [ref=e1598]: . I encourage interested readers to read the original paper but the intuition is easiest to see with a very simple version of RL. Suppose we use REINFORCE with a binary 0/1 reward. Then, if the reward is 1, it contributes positive training signal. If the reward is 0, it contributes none. In that case, reward is acting like a filter and it looks very similar to rejection sampling.
                          - generic [ref=e1602]: If we go back to the initial idea of a target distribution, RL now has one. We can define an optimal policy as the policy where all completions under said policy have reward of 1. Of course, there are multiple optimal policies but because we are training on on-policy samples generated by the current policy, this optimal distribution is the closest among all optimal policies to our current policy. When we perform a policy gradient update step, we are trying to fit our current policy to this new optimal policy which implicitly has low KL to our current policy. Therefore, RL learns the nearest task-solving policy.
                          - generic [ref=e1606]: This gives us a very different geometrical view to think about forgetting. On-policy data constrains the training procedure towards a distribution close to the starting policy at every time step. In contrast, the target distribution for SFT could be arbitrarily far away.
                          - generic [ref=e1610]: This is why I think OPD inherits some of RL’s anti-forgetting behavior and why the OPD student distilled from the SFT teacher can forget less than the SFT teacher itself. The teacher was trained on external data while the student is trained on its own data. Even though the teacher provides the signal, the state distribution is still the student’s.
                          - generic [ref=e1614]: This also answers why on-policy distillation may be more robust to forgetting behavior. Admittedly, the signal from on-policy distillation could be higher variance because your the logits distribution is not perfect, but because of the on-policy nature, it has implicit KL regularization built into the setup.
