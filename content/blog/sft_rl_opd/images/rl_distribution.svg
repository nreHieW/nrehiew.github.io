<svg viewBox="0 35 820 650" width="820" height="650" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="820" height="700" fill="#F7F5F2"/>

  <defs>
    <!-- Arrow markers -->
    <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L7,3 z" fill="#9B9490"/>
    </marker>

    <marker id="arrow-reward" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L7,3 z" fill="#B8962E"/>
    </marker>

    <!-- Radial gradients -->
    <radialGradient id="hill-main" cx="50%" cy="50%" r="68%">
      <stop offset="0%" stop-color="#2E7D6B" stop-opacity=".32"/>
      <stop offset="52%" stop-color="#7FB8B0" stop-opacity=".20"/>
      <stop offset="100%" stop-color="#C8DDD8" stop-opacity=".015"/>
    </radialGradient>

    <radialGradient id="hill-medium" cx="50%" cy="50%" r="62%">
      <stop offset="0%" stop-color="#A09080" stop-opacity=".42"/>
      <stop offset="55%" stop-color="#D2C9BD" stop-opacity=".25"/>
      <stop offset="100%" stop-color="#EDE9E3" stop-opacity=".01"/>
    </radialGradient>

    <radialGradient id="hill-low" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#B0A898" stop-opacity=".20"/>
      <stop offset="55%" stop-color="#DDD8D0" stop-opacity=".10"/>
      <stop offset="100%" stop-color="#EDE9E3" stop-opacity=".01"/>
    </radialGradient>

    <filter id="soft-blur">
      <feGaussianBlur stdDeviation="16"/>
    </filter>

    <!-- Hide the after-update contour wherever it would overlap the original/current core -->
    <mask id="hide-current-core-overlap">
      <rect x="0" y="0" width="820" height="700" fill="white"/>
      <ellipse cx="320" cy="284" rx="75" ry="72" fill="black"/>
    </mask>
  </defs>

  <!-- OUTER POLICY DISTRIBUTION -->
  <ellipse
    cx="410"
    cy="300"
    rx="345"
    ry="245"
    fill="#EDE9E3"
    fill-opacity=".45"
    stroke="#C8C0B4"
    stroke-width="1.7"
    stroke-dasharray="7 5"
  />

  <!-- Very faint broad contour behind main high-probability region -->
  <ellipse
    cx="330"
    cy="274"
    rx="150"
    ry="148"
    fill="none"
    stroke="#D8D0C6"
    stroke-width="0.8"
    opacity=".45"
  />

  <!-- PERIPHERAL REGIONS -->
  <g opacity=".72">
    <path d="M586,208
             C590,180 608,166 632,170
             C650,172 660,158 678,168
             C698,180 706,198 700,220
             C694,246 670,252 646,246
             C628,242 618,254 602,242
             C588,232 584,222 586,208Z" fill="url(#hill-low)"/>
    <path d="M600,208
             C604,190 618,180 636,182
