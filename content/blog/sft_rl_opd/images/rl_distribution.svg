  <circle cx="288" cy="241" r="4.5" fill="#2E7D6B" opacity=".93"/>
  <circle cx="334" cy="242" r="4.3" fill="#2E7D6B" opacity=".90"/>
  <circle cx="304" cy="272" r="4.4" fill="#2E7D6B" opacity=".92"/>
  <circle cx="268" cy="282" r="4.4" fill="#2E7D6B" opacity=".90"/>
  <circle cx="330" cy="286" r="4.3" fill="#2E7D6B" opacity=".88"/>
  <circle cx="285" cy="316" r="4.2" fill="#2E7D6B" opacity=".86"/>
  <circle cx="318" cy="342" r="4.2" fill="#2E7D6B" opacity=".84"/>
  <circle cx="348" cy="330" r="4.1" fill="#2E7D6B" opacity=".82"/>

