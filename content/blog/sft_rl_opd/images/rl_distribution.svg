  <text x="78" y="606" font-family="Inter" font-size="10.5" font-weight="500" fill="#5A5048">High-Probability Core</text>
  <text x="78" y="618" font-family="Inter" font-size="9.3" font-weight="400" fill="#7E766E">Rewarding behavior region</text>

  <rect x="232" y="598" width="20" height="20" rx="4" fill="none" stroke="#0F7D74" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="270" y="606" font-family="Inter" font-size="10.5" font-weight="500" fill="#5A5048">After Update Policy (new)</text>
  <text x="270" y="618" font-family="Inter" font-size="9.3" font-weight="400" fill="#7E766E">More concentrated distribution</text>

  <rect x="428" y="598" width="14" height="13" rx="2" fill="#D2C9BD"/>
  <text x="462" y="606" font-family="Inter" font-size="10.5" font-weight="500" fill="#5A5048">Medium Probability</text>
  <text x="462" y="618" font-family="Inter" font-size="9.3" font-weight="400" fill="#7E766E">Reasonable but imperfect</text>

  <rect x="618" y="598" width="14" height="13" rx="2" fill="#DDD8D0"/>
  <text x="650" y="606" font-family="Inter" font-size="10.5" font-weight="500" fill="#5A5048">Low Probability</text>
  <text x="650" y="618" font-family="Inter" font-size="9.3" font-weight="400" fill="#7E766E">Peripheral alternatives</text>

  <!-- Row 2 -->
  <circle cx="53" cy="641" r="5.5" fill="#2E9A85"/>
  <text x="78" y="638" font-family="Inter" font-size="10.5" font-weight="500" fill="#5A5048">On-Policy Samples</text>
  <text x="78" y="650" font-family="Inter" font-size="9.3" font-weight="400" fill="#7E766E">Green = sampled behaviors</text>

  <circle cx="240" cy="641" r="5.2" fill="#2E9A85"/>
  <circle cx="240" cy="641" r="9.2" fill="none" stroke="#B35F2A" stroke-width="2"/>
  <text x="270" y="638" font-family="Inter" font-size="10.5" font-weight="500" fill="#5A5048">Good Sample (Target)</text>
  <text x="270" y="650" font-family="Inter" font-size="9.3" font-weight="400" fill="#7E766E">Higher score among samples</text>

  <!-- Contours legend -->
  <g transform="translate(435 641)">
    <ellipse cx="0" cy="0" rx="13" ry="10" fill="none" stroke="#CFC9C0" stroke-width=".9"/>
    <ellipse cx="0" cy="0" rx="8.5" ry="6.3" fill="none" stroke="#CFC9C0" stroke-width=".85"/>
    <ellipse cx="0" cy="0" rx="4.3" ry="3.2" fill="none" stroke="#CFC9C0" stroke-width=".8"/>
  </g>
  <text x="462" y="638" font-family="Inter" font-size="10.5" font-weight="500" fill="#5A5048">Contours</text>
  <text x="462" y="650" font-family="Inter" font-size="9.3" font-weight="400" fill="#7E766E">Probability density isolines</text>
</svg>