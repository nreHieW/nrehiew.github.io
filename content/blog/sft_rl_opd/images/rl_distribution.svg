    <text x="235" y="465" text-anchor="middle" font-family="Inter" font-size="8.8" font-weight="500" fill="#7A7169">Stylistic</text>
    <text x="235" y="477" text-anchor="middle" font-family="Inter" font-size="8.8" font-weight="500" fill="#7A7169">Variants</text>
  </g>

  <g opacity=".68">
    <path d="M442,486
             C444,456 466,438 494,444
             C516,448 526,434 548,446
             C568,458 578,476 572,496
             C564,524 536,532 508,526
             C486,522 476,534 458,520
             C444,510 440,502 442,486Z" fill="url(#hill-low)"/>
    <path d="M456,486
             C458,464 476,452 496,456
             C512,458 520,450 536,458
             C552,466 560,480 556,496
             C550,516 530,522 510,518
             C494,514 486,524 472,514
             C460,506 454,500 456,486Z" fill="none" stroke="#DDD8D0" stroke-width=".72"/>
    <path d="M472,486
