    <text x="558" y="335" text-anchor="middle" font-family="Inter" font-size="9.5" font-weight="500" fill="#5A5048">Reasonable but</text>
    <text x="558" y="349" text-anchor="middle" font-family="Inter" font-size="9.5" font-weight="500" fill="#5A5048">Imperfect Solutions</text>
  </g>

  <g opacity=".68">
    <path d="M190,468
             C192,442 210,426 234,432
             C252,438 262,424 278,438
             C294,452 298,468 292,486
             C284,510 262,514 240,508
             C224,504 214,514 202,504
             C192,496 188,486 190,468Z" fill="url(#hill-low)"/>
    <path d="M202,468
             C204,450 218,440 234,444
             C248,448 256,438 268,448
             C280,458 284,470 280,484
             C274,500 258,504 242,500
             C230,496 222,504 212,496
             C204,490 200,482 202,468Z" fill="none" stroke="#DDD8D0" stroke-width=".72"/>
    <path d="M216,468
