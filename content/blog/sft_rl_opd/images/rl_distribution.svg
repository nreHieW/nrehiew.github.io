    <circle cx="388" cy="300" r="4.2" fill="#2E7D6B" opacity=".94"/>
    <circle cx="388" cy="300" r="8.2" fill="none" stroke="#B35F2A" stroke-width="2"/>

    <circle cx="368" cy="326" r="4.2" fill="#2E7D6B" opacity=".94"/>
    <circle cx="368" cy="326" r="8.2" fill="none" stroke="#B35F2A" stroke-width="2"/>
  </g>

  <!-- High-probability label: reduced font size and tightened block -->
  <line x1="276" y1="326" x2="202" y2="366" stroke="#2E7D6B" stroke-width="1.2" opacity=".82"/>
  <text x="112" y="378" text-anchor="start" font-family="Inter" font-size="10.2" font-weight="700" fill="#1E6A60" letter-spacing=".02em">HIGH PROBABILITY</text>
  <text x="112" y="391" text-anchor="start" font-family="Inter" font-size="10.2" font-weight="700" fill="#1E6A60" letter-spacing=".02em">ON-POLICY SAMPLES</text>
  <text x="112" y="405" text-anchor="start" font-family="Inter" font-size="8.8" font-weight="400" fill="#2E7D6B">Current-policy samples</text>
  <text x="112" y="418" text-anchor="start" font-family="Inter" font-size="8.8" font-weight="400" fill="#2E7D6B">concentrated in a rewarding region</text>

  <!-- After update label -->
  <line x1="386" y1="202" x2="414" y2="152" stroke="#2E7D6B" stroke-width="1.1" opacity=".85"/>
  <line x1="414" y1="152" x2="432" y2="152" stroke="#2E7D6B" stroke-width="1.1" opacity=".85"/>
  <text x="438" y="151" text-anchor="start" font-family="Inter" font-size="11.5" font-weight="700" fill="#1E6A60">Updated Policy</text>
  <text x="438" y="168" text-anchor="start" font-family="Inter" font-size="9.8" font-weight="400" fill="#2E7D6B">more concentrated</text>
  <text x="438" y="182" text-anchor="start" font-family="Inter" font-size="9.8" font-weight="400" fill="#2E7D6B">toward rewarding region</text>

  <!-- Reward signal: label moved left to avoid outer edge overlap -->
  <line
    x1="444"
    y1="268"
    x2="606"
    y2="268"
    stroke="#B8962E"
    stroke-width="1.6"
    stroke-dasharray="6 5"
    marker-end="url(#arrow-reward)"
    opacity=".95"
  />
  <text x="618" y="271" text-anchor="start" font-family="Inter" font-size="11.2" font-weight="700" fill="#9A761C" letter-spacing=".03em">REWARD SIGNAL</text>
  <text x="618" y="287" text-anchor="start" font-family="Inter" font-size="9" font-weight="400" fill="#A08020">Scores sampled behavior</text>

  <!-- CURRENT POLICY LABEL -->
  <text x="58" y="88" text-anchor="start" font-family="Inter" font-size="10.5" font-weight="700" fill="#5F5954" letter-spacing="0.04em">CURRENT POLICY</text>
  <text x="58" y="104" text-anchor="start" font-family="Inter" font-size="11" font-weight="400" fill="#5F5954" font-style="italic">
    π<tspan font-size="8" baseline-shift="sub">θ</tspan>(y | x)
  </text>
  <line x1="118" y1="99" x2="168" y2="143" stroke="#9B9490" stroke-width="1.1" opacity=".65" marker-end="url(#arrow-gray)"/>

  <!-- LEGEND -->
